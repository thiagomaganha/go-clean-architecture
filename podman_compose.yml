version: '3'

services:
  app:
    build: .
    container_name: clean_architecture_app
    restart: on-failure
    ports:
      - "8000:8000"
      - "50051:50051"
      - "8080:8080"
    environment:
      - DB_HOST=mysql
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: docker.io/library/mysql:5.7
    container_name: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: orders
      MYSQL_PASSWORD: root
    ports:
      - 3306:3306
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:

